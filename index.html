<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Time Series Line Chart</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .line {
      fill: none;
      stroke: steelblue;
      stroke-width: 2;
    }
    .axis-label {
      font-size: 12px;
      fill: #555;
    }
    .tooltip {
      position: absolute;
      text-align: center;
      padding: 5px;
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 5px;
      pointer-events: none;
      visibility: hidden;
    }
  </style>
</head>
<body>

<h2>Interactive Time Series Line Chart</h2>
<svg width="800" height="400"></svg>
<div class="tooltip"></div>

<script src="script.js"></script>

</body>
</html>
